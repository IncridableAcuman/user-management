services:
  backend:
    build: ./backend
    container_name: backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${}
      SPRING_DATASOURCE_USERNAME: ${}
      SPRING_DATASOURCE_PASSWORD: ${}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_RABBITMQ_HOST: rabbitmq
    depends_on:
      - postgres
      - rabbitmq
      - redis

  postgres:
    image: postgres:latest
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ${}
      POSTGRES_USER: ${}
      POSTGRES_PASSWORD: ${}
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
     - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  pgdata: