services:
  backend:
    build: ./backend
    container_name: backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6378
      SPRING_DATA_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_RABBITMQ_PORT: 5673
    depends_on:
      - postgres
      - rabbitmq
      - redis
    volumes:
      - upload_data:/app/upload
      - logs_data:/app/logs

  postgres:
    image: postgres:latest
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
     - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

volumes:
  pg_data:
  upload_data:
  logs_data: